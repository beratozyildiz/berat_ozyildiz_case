name: QA Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  ui-tests:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ui-tests/package-lock.json

      - name: Install dependencies
        run: |
          cd ui-tests
          npm install
          npx playwright install --with-deps

      - name: Run UI tests
        run: |
          cd ui-tests
          npx playwright test

      - name: Prepare report for GitHub Pages
        if: always()
        run: |
          mkdir -p public/ui-report
          cp -r ui-tests/playwright-report/* public/ui-report/

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/deploy-pages@v4

      - name: Upload UI Report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-playwright-report
          path: ui-tests/playwright-report/

  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: api-tests/package-lock.json

      - name: Install dependencies
        run: |
          cd api-tests
          npm install

      - name: Run API tests
        run: |
          cd api-tests
          npx playwright test

      - name: Upload API Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-playwright-report
          path: api-tests/playwright-report/

  load-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          cd load-tests
          pip install -r requirements.txt

      - name: Run load tests
        run: |
          cd load-tests
          locust -f locustfile.py --headless -u 1 -r 1 -t 10s --only-summary
